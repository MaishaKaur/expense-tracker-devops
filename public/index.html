<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExpenseTracker – Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      width: 420px;
      padding: 40px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo-icon {
      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 30px; margin-bottom: 12px;
    }
    .logo h1 { font-size: 1.6rem; color: #1a1a2e; font-weight: 700; }
    .logo p { color: #666; font-size: 0.9rem; margin-top: 4px; }
    .tabs { display: flex; border-radius: 12px; background: #f3f4f6; padding: 4px; margin-bottom: 28px; }
    .tab {
      flex: 1; padding: 10px; border: none; background: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; color: #666; transition: all 0.2s;
    }
    .tab.active { background: #fff; color: #764ba2; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #444; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 10px;
      font-size: 1rem; transition: border-color 0.2s; outline: none;
    }
    input:focus { border-color: #764ba2; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 1rem;
      font-weight: 700; cursor: pointer; transition: all 0.2s;
      background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 15px rgba(118,75,162,0.4); }
    .error { background: #fef2f2; color: #dc2626; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 16px; display: none; }
    .hidden { display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">💰</div>
    <h1>ExpenseTracker</h1>
    <p>Take control of your finances</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Sign In</button>
    <button class="tab" onclick="showTab('register')">Sign Up</button>
  </div>

  <div id="error-msg" class="error"></div>

  <!-- Login Form -->
  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="login-email" placeholder="you@example.com" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" required />
    </div>
    <button class="btn" type="submit">Sign In</button>
  </form>

  <!-- Register Form -->
  <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label>Full name</label>
      <input type="text" id="reg-name" placeholder="Jane Smith" required />
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="reg-email" placeholder="you@example.com" required />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Min. 6 characters" required />
    </div>
    <button class="btn" type="submit">Create Account</button>
  </form>
</div>

<script>
  if (localStorage.getItem('token')) window.location.href = '/dashboard.html';

  function showTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (tab === 'login')));
    document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
    document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
    document.getElementById('error-msg').style.display = 'none';
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.style.display = 'block';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) return showError(data.error || 'Login failed');
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = '/dashboard.html';
    } catch { showError('Network error – is the server running?'); }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const name = document.getElementById('reg-name').value;
    const email = document.getElementById('reg-email').value;
    const password = document.getElementById('reg-password').value;
    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (!res.ok) return showError(data.error || 'Registration failed');
      showTab('login');
      document.getElementById('login-email').value = email;
    } catch { showError('Network error'); }
  }
</script>
</body>
</html>

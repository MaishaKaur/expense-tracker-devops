services:
  app:
    image: ${DOCKER_IMAGE_TAG:-expensetracker:latest}
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://expenseuser:${POSTGRES_PASSWORD:-expensepassword}@postgres:5432/expensedb_prod
      JWT_SECRET: ${JWT_SECRET:-change-in-prod}
    ports:
      - "3000:3000"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 3
  postgres:
    environment:
      POSTGRES_DB: expensedb_prod
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-expensepassword}
